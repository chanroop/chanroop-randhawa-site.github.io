<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Geography Quiz</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="text-center">

  <div class="quiz-container">

    <h1 class="quiz-title">US Geography Quiz</h1>

    <!-- Question 1 -->
    <h3>1) What is the capital of California?</h3>
    <input id="q1" type="text" class="form-control">
    <p id="feedback1"></p>

    <!-- Question 2 -->
    <h3>2) Which is the largest US state?</h3>
    <select id="q2" class="form-select">
      <option value="">Select one</option>
      <option value="California">California</option>
      <option value="Texas">Texas</option>
      <option value="Alaska">Alaska</option>
      <option value="Montana">Montana</option>
    </select>
    <p id="feedback2"></p>

    <!-- Question 3 -->
    <h3>3) Select the presidents on Mt. Rushmore:</h3>

    <div class="question-block">

      <input type="checkbox" id="washington">
      <label for="washington">George Washington</label><br>

      <input type="checkbox" id="jefferson">
      <label for="jefferson">Thomas Jefferson</label><br>

      <input type="checkbox" id="lincoln">
      <label for="lincoln">Abraham Lincoln</label><br>

      <input type="checkbox" id="roosevelt">
      <label for="roosevelt">Theodore Roosevelt</label><br>

      <input type="checkbox" id="kennedy">
      <label for="kennedy">John F. Kennedy</label>

    </div>

    <p id="feedback3"></p>

    <!-- Question 4 -->
    <h3>4) What ocean borders California?</h3>

    <div class="question-block">

      <input type="radio" id="atlantic" name="ocean" value="Atlantic">
      <label for="atlantic">Atlantic Ocean</label><br>

      <input type="radio" id="pacific" name="ocean" value="Pacific">
      <label for="pacific">Pacific Ocean</label><br>

      <input type="radio" id="indian" name="ocean" value="Indian">
      <label for="indian">Indian Ocean</label>

    </div>

    <p id="feedback4"></p>

    <!-- Question 5 (Randomized) -->
    <h3>5) Which state is known as the Sunshine State?</h3>

    <div id="choices"></div>

    <p id="feedback5"></p>

    <!-- Submit Button -->
    <button id="submitButton" class="btn btn-primary">
      Submit Quiz
    </button>

    <!-- Results -->
    <h2 id="totalScore"></h2>
    <h3 id="totalAttempts"></h3>
    <h3 id="message"></h3>

  </div>

  <!-- Your JS -->
  <script src="js/script.js"></script>

</body>
</html>
