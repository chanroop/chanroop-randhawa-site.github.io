<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HW 3 - Earthquake Finder</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <h1>Earthquake Finder</h1>
      <p>Search recent earthquakes by date range and minimum magnitude</p>
    </div>
  </header>

  <main class="container">
    <section class="card search-card">
      <h2>Search Criteria</h2>

      <form id="quakeForm">
        <div class="form-grid">
          <div>
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" required />
          </div>

          <div>
            <label for="endDate">End Date</label>
            <input type="date" id="endDate" required />
          </div>

          <div>
            <label for="magnitude">Minimum Magnitude</label>
            <input type="number" id="magnitude" min="0" step="0.1" required />
          </div>
        </div>

        <button type="submit">Search Earthquakes</button>
      </form>

      <p id="message"></p>
    </section>

    <section class="card results-card">
      <h2>Results</h2>
      <div id="results"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
