<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HW 3 - Earthquake Finder</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Earthquake Finder</h1>
    <p>Search earthquakes by date range and minimum magnitude</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Search Criteria</h2>

      <form id="quakeForm">
        <label for="startDate">Start Date:</label>
        <input type="date" id="startDate" required />

        <label for="endDate">End Date:</label>
        <input type="date" id="endDate" required />

        <label for="magnitude">Minimum Magnitude:</label>
        <input type="number" id="magnitude" min="0" step="0.1" required />

        <button type="submit">Search</button>
      </form>

      <p id="message"></p>
    </section>

    <section class="card">
      <h2>Results</h2>
      <div id="results"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
