<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow">
          <div class="card-body p-4">
            <h1 class="mb-4 text-center">Sign Up</h1>

            <form id="signupForm" action="welcome.html">
              <div class="mb-3">
                <label class="form-label">First Name:</label>
                <input type="text" name="fName" class="form-control">
              </div>

              <div class="mb-3">
                <label class="form-label">Last Name:</label>
                <input type="text" name="lName" class="form-control">
              </div>

              <div class="mb-3">
                <label class="form-label d-block">Gender:</label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" value="m" id="male">
                  <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" value="f" id="female">
                  <label class="form-check-label" for="female">Female</label>
                </div>
              </div>

              <div class="mb-3">
                <label for="zip" class="form-label">Zip Code:</label>
                <input type="text" id="zip" name="zip" class="form-control">
                <span id="zipError" class="small"></span>
              </div>

              <div class="mb-3">
                <label class="form-label">City:</label>
                <span id="city" class="ms-2 fw-semibold"></span>
              </div>

              <div class="mb-3">
                <label class="form-label">Latitude:</label>
                <span id="latitude" class="ms-2 fw-semibold"></span>
              </div>

              <div class="mb-3">
                <label class="form-label">Longitude:</label>
                <span id="longitude" class="ms-2 fw-semibold"></span>
              </div>

              <div class="mb-3">
                <label for="state" class="form-label">State:</label>
                <select id="state" name="state" class="form-select">
                  <option value="">Select One</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="county" class="form-label">Select a County:</label>
                <select id="county" name="county" class="form-select">
                  <option>Select County</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="username" class="form-label">Desired Username:</label>
                <input type="text" id="username" name="username" class="form-control">
                <span id="usernameError" class="small"></span>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" id="password" name="password" class="form-control">
                <span id="suggestedPwd" class="small d-block mt-1 text-primary"></span>
              </div>

              <div class="mb-3">
                <label for="retypePassword" class="form-label">Type Password Again:</label>
                <input type="password" id="retypePassword" name="retypePassword" class="form-control">
              </div>

              <div class="mb-3">
                <span id="passwordError" class="small"></span>
              </div>

              <div class="d-grid">
                <input type="submit" value="Sign up!" class="btn btn-primary">
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
