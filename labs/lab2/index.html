<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Number</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="overlay">
    <div class="game-container">
      <h1>Guess the Number</h1>
      <p class="instructions">
        Enter a number between 1 and 99. You have 7 attempts to guess correctly.
      </p>

      <div class="input-section">
        <label for="playerGuess">Your Guess:</label>
        <input type="text" id="playerGuess">
        <button id="guessBtn">Guess</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="stats">
        <p><strong>Attempts Left:</strong> <span id="attemptsLeft">7</span></p>
        <p><strong>Wins:</strong> <span id="wins">0</span></p>
        <p><strong>Losses:</strong> <span id="losses">0</span></p>
      </div>

      <div id="message"></div>

      <div class="guesses-box">
        <h2>Previous Guesses</h2>
        <ul id="guessList"></ul>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
