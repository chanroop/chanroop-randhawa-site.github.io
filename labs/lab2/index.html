<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 2 - Number Guessing Game</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="overlay">
    <main class="game-container">
      <h1>Number Guessing Game</h1>

      <p class="instructions">
        Guess a number between <strong>1</strong> and <strong>99</strong>.
        You have <strong>7 attempts</strong> to win.
      </p>

      <section class="scoreboard">
        <div class="score-box">
          <span class="score-label">Wins</span>
          <span id="wins">0</span>
        </div>

        <div class="score-box">
          <span class="score-label">Losses</span>
          <span id="losses">0</span>
        </div>

        <div class="score-box">
          <span class="score-label">Attempts</span>
          <span id="attempts">0</span>
        </div>
      </section>

      <section class="form-section">
        <label for="guessInput">Enter your guess:</label>
        <input
          type="number"
          id="guessInput"
          min="1"
          max="99"
          placeholder="1 - 99"
        />

        <div class="button-group">
          <button id="guessBtn">Guess</button>
          <button id="resetBtn">Reset</button>
        </div>
      </section>

      <section class="message-section">
        <p id="message">Start the game by entering a number.</p>
        <p id="errorMessage"></p>
      </section>

      <section class="guesses-section">
        <h2>Previous Guesses</h2>
        <p id="guessList">None yet.</p>
      </section>
    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
